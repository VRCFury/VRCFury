name: 'Deploy'
on: push

env:
  GAMECI_VERSION: 3.2.1

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROJECT_PATH: .github/workflows/test_project
    strategy:
      fail-fast: false
      matrix:
        vrcsdkUnityVersion:
          - [ 3.10.1, 2022.3.22f1 ]
          - [ 3.7.0, 2022.3.6f1 ]
          - [ 3.6.1, 2022.3.6f1 ]
          - [ 3.5.2, 2022.3.6f1 ]
          - [ 3.5.0, 2022.3.6f1 ]
          - [ 3.3.0, 2019.4.31f1 ]
          - [ 3.0.9, 2019.4.31f1 ]
          - [ 2022.06.03.00.04, 2019.4.31f1 ]
          - [ 3.10.1, 6000.3.1f1 ]
        platform:
          - windows
          - android
        sdkKind:
          - avatars
        include:
          - vrcsdkUnityVersion: [ 3.10.1, 2022.3.22f1 ]
            platform: windows
            sdkKind: worlds
          - vrcsdkUnityVersion: [ 3.10.1, 2022.3.22f1 ]
            platform: android
            sdkKind: worlds
    steps:
      - uses: actions/checkout@v6

      # Github's "ubuntu-latest" comes with a ton of unused stuff that pushes us over the disk limit
      - name: Clean up node
        run: |
          rm -R .git
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune --all --force
          docker builder prune -a

      - name: Download VRCSDK
        run: |
          VERSION="${{ matrix.vrcsdkUnityVersion[0] }}"
          SDK_KIND="${{ matrix.sdkKind }}"
          echo "Downloading VRCSDK $VERSION"

          download_manifest_package() {
            local package_name="$1"
            local version="$2"
            local zip_path="$package_name.zip"
            local url="$(echo "$MANIFEST" | jq ".packages.\"$package_name\".versions.\"$version\".url" --raw-output)"

            echo "$package_name URL is $url"
            curl -L -o "$zip_path" "$url"
            mkdir -p "$PROJECT_PATH/Packages/$package_name"
            unzip "$zip_path" -d "$PROJECT_PATH/Packages/$package_name"
            rm "$zip_path"
          }

          if [[ "$VERSION" == "2022.06.03.00.04" ]]; then
            curl -L -o "vrcsdk.zip" "https://github.com/VRCFury/VRCFury/releases/download/old-vrcsdk/VRCSDK.zip"
            unzip "vrcsdk.zip" -d "$PROJECT_PATH/Assets"
            rm "vrcsdk.zip"
          else
            MANIFEST_URL="https://vrchat.github.io/packages/index.json"
            echo "Downloading manifest from $MANIFEST_URL"
            MANIFEST="$(curl "$MANIFEST_URL")"
            download_manifest_package "com.vrchat.base" "$VERSION"

            if [[ "$SDK_KIND" == "worlds" ]]; then
              SDK_PACKAGE="com.vrchat.worlds"
            else
              SDK_PACKAGE="com.vrchat.avatars"
            fi

            download_manifest_package "$SDK_PACKAGE" "$VERSION"

            if [[ "$SDK_KIND" == "worlds" ]]; then
              # UdonSharp's import hook tries to create UdonSharpDataLocator.asset during
              # package import. In CI, Unity can restart import mid-flight, which makes
              # that CreateAsset path fail before we reach compile/test verification.
              LOCATOR_FILE="$PROJECT_PATH/Packages/com.vrchat.worlds/Integrations/UdonSharp/Runtime/UdonSharpDataLocator.cs"
              perl -0pi -e 's/private static void OnPostprocessAllAssets\(string\[] importedAssets, string\[] deletedAssets, string\[] movedAssets, string\[] movedFromAssetPaths\)\s*\{\s*/private static void OnPostprocessAllAssets(string[] importedAssets, string[] deletedAssets, string[] movedAssets, string[] movedFromAssetPaths)\n        {\n            return;\n\n/s' "$LOCATOR_FILE"
            fi
          fi

      - name: Verify Compile
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          IMAGE="unityci/editor:ubuntu-${{ matrix.vrcsdkUnityVersion[1] }}"
          if [ "${{ matrix.platform }}" = "android" ]; then
            IMAGE="$IMAGE-android"
          else
            IMAGE="$IMAGE-windows-mono"
          fi
          IMAGE="$IMAGE-${{ env.GAMECI_VERSION }}"

          chmod +x .github/workflows/test_ci.sh
          docker run --rm \
              --env UNITY_LICENSE \
              --volume="${PWD}:/opt/project" \
              "$IMAGE" \
              /opt/project/.github/workflows/test_ci.sh

  deploy:
    needs: test
    if: github.ref_name == github.event.repository.default_branch || github.ref_name == 'beta'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          path: repo
      - name: Copy license
        working-directory: repo
        run: |
          cp LICENSE.md com.vrcfury.vrcfury/LICENSE.md
          cp .github/files/LICENSE.md.meta com.vrcfury.vrcfury/LICENSE.md.meta
          cp CONTRIBUTING.md com.vrcfury.vrcfury/CONTRIBUTING.md
          cp .github/files/CONTRIBUTING.md.meta com.vrcfury.vrcfury/CONTRIBUTING.md.meta
      - name: Checkout version manifest
        uses: actions/checkout@v6
        with:
          path: versions
          repository: VRCFury/vrcfury-updater-manifest
          ssh-key: ${{ secrets.VERSION_DEPLOY_KEY }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Bundle
        working-directory: repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          (cd .github/workflows && npm install)
          node .github/workflows/bundle.js
      - name: Push version manifest
        working-directory: versions
        run: |
          git diff
          git config user.name VRCFury Releases
          git config user.email noreply@vrcfury.com
          git diff --quiet || git commit -am "Release from $GITHUB_SHA"
          git push
