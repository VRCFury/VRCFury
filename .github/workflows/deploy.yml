name: 'Deploy'
on: push

env:
  GAMECI_VERSION: 3.2.1

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        vrcsdkUnityVersion:
          - [ 3.10.1, 2022.3.22f1 ]
          - [ 3.7.0, 2022.3.6f1 ]
          - [ 3.6.1, 2022.3.6f1 ]
          - [ 3.5.2, 2022.3.6f1 ]
          - [ 3.5.0, 2022.3.6f1 ]
          - [ 3.3.0, 2019.4.31f1 ]
          - [ 3.0.9, 2019.4.31f1 ]
          - [ 3.10.1, 6000.3.1f1 ]
        platform:
          - windows
          - android
        sdkKind:
          - avatars
        include:
          - vrcsdkUnityVersion: [ 3.10.1, 2022.3.22f1 ]
            platform: windows
            sdkKind: worlds
          - vrcsdkUnityVersion: [ 3.10.1, 2022.3.22f1 ]
            platform: android
            sdkKind: worlds
    steps:
      - uses: actions/checkout@v6

      # Github's "ubuntu-latest" comes with a ton of unused stuff that pushes us over the disk limit
      - name: Clean up node
        run: |
          rm -R .git
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune --all --force
          docker builder prune -a

      - name: Download VRCSDK
        run: |
          PROJECT_PATH=.github/test_project .github/scripts/download_vrcsdk.sh "${{ matrix.vrcsdkUnityVersion[0] }}" "${{ matrix.sdkKind }}"

      - name: Resolve Test Image
        id: image
        run: |
          IMAGE="unityci/editor:ubuntu-${{ matrix.vrcsdkUnityVersion[1] }}"
          if [ "${{ matrix.platform }}" = "android" ]; then
            IMAGE="$IMAGE-android"
          else
            IMAGE="$IMAGE-windows-mono"
          fi
          IMAGE="$IMAGE-${{ env.GAMECI_VERSION }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Verify Compile
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .github/test_project
          unityVersion: ${{ matrix.vrcsdkUnityVersion[1] }}
          testMode: EditMode
          customImage: ${{ steps.image.outputs.image }}
          customParameters: -testCategory VRCFury
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: test
    if: github.ref_name == github.event.repository.default_branch || github.ref_name == 'beta'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          path: repo
      - name: Copy license
        working-directory: repo
        run: |
          cp LICENSE.md com.vrcfury.vrcfury/LICENSE.md
          cp .github/files/LICENSE.md.meta com.vrcfury.vrcfury/LICENSE.md.meta
          cp CONTRIBUTING.md com.vrcfury.vrcfury/CONTRIBUTING.md
          cp .github/files/CONTRIBUTING.md.meta com.vrcfury.vrcfury/CONTRIBUTING.md.meta
      - name: Checkout version manifest
        uses: actions/checkout@v6
        with:
          path: versions
          repository: VRCFury/vrcfury-updater-manifest
          ssh-key: ${{ secrets.VERSION_DEPLOY_KEY }}
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: repo/.github/scripts/package.json
          standalone: true
      - name: Bundle
        working-directory: repo/.github/scripts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm install --frozen-lockfile
          pnpm node bundle.js "$GITHUB_WORKSPACE/repo" "$GITHUB_WORKSPACE/versions"
      - name: Push version manifest
        working-directory: versions
        run: |
          git diff
          git config user.name VRCFury Releases
          git config user.email noreply@vrcfury.com
          git diff --quiet || git commit -am "Release from $GITHUB_SHA"
          git push
